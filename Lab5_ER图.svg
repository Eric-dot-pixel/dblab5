<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .title { font: 700 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .text { font: 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rel { font: 13px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="560" y="36" text-anchor="middle" class="title">SocialDB 社交网络平台 ER 图</text>

  <rect x="60" y="90" width="230" height="170" class="box"/>
  <text x="175" y="120" text-anchor="middle" class="title">User 用户</text>
  <text x="82" y="150" class="text">PK user_id</text>
  <text x="82" y="174" class="text">username, password</text>
  <text x="82" y="198" class="text">real_name, gender</text>
  <text x="82" y="222" class="text">birthdate, age</text>
  <text x="82" y="246" class="text">created_at, is_active</text>

  <rect x="445" y="90" width="230" height="145" class="box"/>
  <text x="560" y="120" text-anchor="middle" class="title">FriendGroup 好友分组</text>
  <text x="467" y="150" class="text">PK group_id</text>
  <text x="467" y="174" class="text">FK user_id</text>
  <text x="467" y="198" class="text">group_name</text>
  <text x="467" y="222" class="text">UNIQUE(user_id, group_name)</text>

  <rect x="815" y="90" width="230" height="145" class="box"/>
  <text x="930" y="120" text-anchor="middle" class="title">Admin 管理员</text>
  <text x="837" y="150" class="text">PK admin_id</text>
  <text x="837" y="174" class="text">username, password</text>
  <text x="837" y="198" class="text">real_name, email</text>

  <rect x="445" y="310" width="230" height="155" class="box"/>
  <text x="560" y="340" text-anchor="middle" class="title">Friendship 好友关系</text>
  <text x="467" y="370" class="text">PK (user_id, friend_id)</text>
  <text x="467" y="394" class="text">FK user_id -&gt; User</text>
  <text x="467" y="418" class="text">FK friend_id -&gt; User</text>
  <text x="467" y="442" class="text">FK group_id -&gt; FriendGroup</text>

  <rect x="60" y="500" width="230" height="150" class="box"/>
  <text x="175" y="530" text-anchor="middle" class="title">Post 朋友圈</text>
  <text x="82" y="560" class="text">PK post_id</text>
  <text x="82" y="584" class="text">FK user_id</text>
  <text x="82" y="608" class="text">content, created_at</text>
  <text x="82" y="632" class="text">updated_at</text>

  <rect x="445" y="520" width="230" height="145" class="box"/>
  <text x="560" y="550" text-anchor="middle" class="title">Comment 评论</text>
  <text x="467" y="580" class="text">PK comment_id</text>
  <text x="467" y="604" class="text">FK post_id</text>
  <text x="467" y="628" class="text">FK user_id</text>
  <text x="467" y="652" class="text">content, created_at</text>

  <path d="M290 160 L445 160" class="line"/>
  <text x="340" y="146" class="rel">1:N 创建</text>

  <path d="M290 210 C360 250 405 305 445 350" class="line"/>
  <text x="330" y="286" class="rel">1:N 添加好友</text>

  <path d="M560 235 L560 310" class="line"/>
  <text x="574" y="276" class="rel">1:N 归组</text>

  <path d="M175 260 L175 500" class="line"/>
  <text x="190" y="388" class="rel">1:N 发布</text>

  <path d="M290 575 L445 590" class="line"/>
  <text x="338" y="566" class="rel">1:N 拥有评论</text>

  <path d="M290 230 C390 360 420 520 445 625" class="line"/>
  <text x="312" y="455" class="rel">1:N 发表评论</text>
</svg>
